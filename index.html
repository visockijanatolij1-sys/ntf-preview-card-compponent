<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Preview card component</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="card">
                <div class="card__image">
                    <img src="./img/image-equilibrium.jpg" alt="Image Equilibrium">
                </div>
                <h1 class="card__title">Equilibrium <span>#3429</span></h1>
                <p class="card__text">Our Equilibrium collection promotes balance and calm.</p>
                <div class="card-block">
                    <p class="card__number">0.041 ETH</p>
                    <p class="card__time">3 days left</p>
                </div>
                <div class="card-footer">
                    <img src="./img/image-avatar.png" alt="Image Avatar" class="card__author-image">
                    <p class="card__author-name">Creation of <span>Jules Wyvern</span></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
